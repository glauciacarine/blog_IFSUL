<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Glaucia</title>
  <link rel="icon" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <text x='50%' y='60%' font-size='70' text-anchor='middle'
        fill='%232563eb' font-family='Arial' font-weight='bold'>G</text>
  </svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark menu-principal fixed-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Glaucia | Polo Novo Hamburgo</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal"
        aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuPrincipal">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">Sobre</a></li>
          <li class="nav-item"><a class="nav-link" href="curriculum.html">Tecnologias</a></li>
          <li class="nav-item"><a class="nav-link" href="projetos.html">Projetos</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contato</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="toolbar" aria-label="Ferramentas de acessibilidade">
    <button onclick="toggleDarkMode()" title="Modo noturno" aria-label="Alternar modo noturno">🌙</button>
    <button onclick="aumentarFonte()" title="Aumentar fonte" aria-label="Aumentar fonte">A+</button>
    <button onclick="resetarFonte()" title="Fonte normal" aria-label="Voltar ao tamanho normal da fonte">A</button>
    <button onclick="diminuirFonte()" title="Diminuir fonte" aria-label="Diminuir fonte">A-</button>
  </div>

  <main class="container pagina">
    <section class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card form-card">
          <div class="card-body p-4 p-md-5">
            <h1 class="titulo-secao text-center">Contato</h1>
            <p class="subtitulo text-center mb-4">Envie uma mensagem pelo formulário abaixo.</p>

            <form id="formContato">
              <div class="mb-3">
                <label for="nome" class="form-label">Nome:</label>
                <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="email@email.com.br" required>
              </div>

              <div class="mb-3">
                <label for="mensagem" class="form-label">Mensagem:</label>
                <textarea id="mensagem" class="form-control" placeholder="Escreva sua mensagem aqui..." rows="5"
                  required></textarea>
              </div>

              <div class="d-grid d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-dark px-4">Enviar</button>
              </div>
            </form>

            <div id="mensagemSucesso" class="alert alert-success mt-3 d-none" role="alert">✅ Formulário enviado com
              sucesso!</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Glaucia - Portfólio acadêmico desenvolvido com Bootstrap</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>

</html>
